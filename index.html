<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jairo — TTS Chunking Engine (Ferrari Aesthetic)</title>

<style>
  :root{
    --bg-dark:#0b0f19;
    --panel:#0f172a;
    --muted:#94a3b8;
    --accent-teal:#2dd4bf;
    --accent-red:#ef4444;
  }

  html,body{height:100%;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:var(--bg-dark);color:#f1f5f9;}

/* Background / Ferrari aesthetic */
  body {
    background-image:
      linear-gradient(rgba(11,15,25,0.45), rgba(0,0,0,0.85)),
      url('https://meshekatlan.com/wp-content/uploads/2026/05/Gemini_Generated_Image_-4.png');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-repeat:no-repeat;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  main{max-width:420px;margin:36px auto;padding:20px;}

  header{display:flex;flex-direction:column;align-items:center;margin-bottom:18px}
  .logo {
    width:96px;height:96px;border-radius:18px;background:rgba(15,23,42,0.6);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;margin-bottom:12px;
    box-shadow:0 18px 40px -12px rgba(0,0,0,0.6);
    transform:rotate(3deg);transition:transform .28s ease;
  }
  .logo:hover{transform:rotate(0)}
  .logo span{font-weight:900;font-size:28px;background:linear-gradient(180deg,#fff,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent}

  h1{font-size:28px;margin:0;font-weight:900;letter-spacing:0.02em;text-transform:uppercase}
  h2{font-size:12px;margin:6px 0 0;color:#f87171;font-weight:800;letter-spacing:0.18em;text-transform:uppercase}

  /* Glass panel */
  .glass-panel{
    background:rgba(15,23,42,0.62);
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
    padding:22px;border-radius:20px;
  }

  label{display:block;color:#94a3b8;font-size:11px;margin-bottom:8px;font-weight:700;letter-spacing:0.06em}
  select,textarea,input{font-family:inherit}

  select{
    width:100%;padding:12px;border-radius:12px;background:rgba(2,6,23,0.6);border:1px solid rgba(148,163,184,0.06);
    color:#e6eef6;font-size:13px;appearance:none;
  }

  textarea{
    width:100%;min-height:140px;padding:14px;border-radius:14px;background:rgba(0,0,0,0.45);border:1px solid rgba(148,163,184,0.06);
    color:#e6eef6;font-size:13px;resize:none;box-shadow:inset 0 2px 8px rgba(0,0,0,0.6);
  }

  .ignition-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%);border:1px solid #f87171;color:#fff;padding:14px;border-radius:14px;font-weight:900;
    box-shadow:0 8px 30px rgba(220,38,38,0.28);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;
  }
  .ignition-btn:disabled{opacity:0.5;cursor:not-allowed}
  .ignition-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 18px 40px rgba(220,38,38,0.42)}

  .telemetry-console{margin-top:14px;background:rgba(0,0,0,0.42);border-radius:12px;padding:12px;border:1px inset rgba(255,255,255,0.03)}
  .status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:1px solid rgba(148,163,184,0.06);padding-bottom:8px}
  .status-row .label{font-family:monospace;color:#94a3b8;font-size:11px;letter-spacing:0.08em}
  .status-row .value{font-weight:800;color:#f87171;font-family:inherit}

  ul#chunk-list{list-style:none;padding:0;margin:0;max-height:160px;overflow:auto;color:#94a3b8;font-family:monospace;font-size:12px}
  ul#chunk-list li{padding:8px;border-radius:8px}

  .portal-btn{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:12px;background:rgba(30,41,59,0.6);border:1px solid rgba(255,255,255,0.04);color:#e6eef6;text-decoration:none;margin-top:12px}
  .portal-btn:hover{transform:translateY(-3px);background:rgba(45,212,191,0.12);border-color:rgba(45,212,191,0.28)}

  /* small scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<main>
  <header>
    <div class="logo"><span>J&V</span></div>
    <h1>Jairo Bonilla</h1>
    <h2>The Digital Houdini</h2>
  </header>

  <section class="glass-panel">
    <div style="position:absolute;left:50%;transform:translateX(-50%);top:-18px;background:#ef4444;color:#fff;padding:6px 12px;border-radius:999px;font-weight:900;font-size:11px;letter-spacing:0.12em;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 30px rgba(239,68,68,0.18)">Proprietary TTS Engine</div>

    <h3 style="text-align:center;margin:8px 0 6px;font-size:20px">Vocal Architecture</h3>
    <p style="text-align:center;color:#94a3b8;font-size:12px;margin:0 0 14px">Bypass server limits. Initiate chunking sequence.</p>

    <div style="margin-bottom:12px">
      <label for="voice-select">Audio Output Module</label>
      <select id="voice-select"><option>Loading neural voices...</option></select>
    </div>

    <textarea id="tts-input" placeholder="Paste your raw script here..."></textarea>

    <button id="tts-play-btn" class="ignition-btn" type="button" aria-live="polite">
      <span>Initiate Chunking</span>
      <svg class="w-5 h-5" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="opacity:0.95">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </button>

    <div class="telemetry-console">
      <div class="status-row">
        <div class="label">System Status</div>
        <div id="tts-status" class="value" style="color:#ef4444">Standby</div>
      </div>
      <ul id="chunk-list"><li style="opacity:0.6;font-style:italic">Awaiting data stream...</li></ul>
    </div>
  </section>

  <section style="margin-top:18px;display:flex;flex-direction:column;gap:10px">
    <a class="portal-btn" href="#" role="button">🩹 Return to Curi Band-Aid</a>
    <a class="portal-btn" href="#" role="button">🗝️ Access The Vault</a>
  </section>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const textInput = document.getElementById('tts-input');
    const playBtn = document.getElementById('tts-play-btn');
    const statusDisplay = document.getElementById('tts-status');
    const chunkListDisplay = document.getElementById('chunk-list');
    const voiceSelect = document.getElementById('voice-select');

    let voices = [];
    let defaultVoiceIndex = null;

    // Populate voices safely and pick a single default
    function populateVoiceList() {
        voices = window.speechSynthesis.getVoices() || [];
        voiceSelect.innerHTML = '';
        defaultVoiceIndex = null;

        if (!voices.length) {
            const opt = document.createElement('option');
            opt.textContent = 'No voices available';
            opt.value = '';
            voiceSelect.appendChild(opt);
            return;
        }

        voices.forEach((voice, index) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.value = index;
            voiceSelect.appendChild(option);

            // pick the first desirable voice as default (only one)
            if (defaultVoiceIndex === null) {
                const name = (voice.name || '').toLowerCase();
                if (name.includes('google') || name.includes('neural') || name.includes('zira') || name.includes('en-us')) {
                    defaultVoiceIndex = index;
                }
            }
        });

        // fallback to first voice if none matched
        if (defaultVoiceIndex === null && voices.length > 0) defaultVoiceIndex = 0;
        if (defaultVoiceIndex !== null) voiceSelect.value = defaultVoiceIndex;
    }

    populateVoiceList();
    if (typeof speechSynthesis !== 'undefined' && 'onvoiceschanged' in speechSynthesis) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    // Robust chunking: includes trailing text without punctuation
    function breakTextIntoChunks(text) {
        if (!text) return [];
        const regex = /[^.!?;\n]+[.!?;\n]*/g;
        const chunks = text.match(regex) || [];
        return chunks.map(c => c.trim()).filter(Boolean);
    }

    // Play a single chunk with optional voice index
    function processAndPlayChunk(textChunk, selectedVoiceIndex) {
        return new Promise((resolve) => {
            try {
                const utterance = new SpeechSynthesisUtterance(textChunk);
                if (selectedVoiceIndex !== null && voices[selectedVoiceIndex]) {
                    utterance.voice = voices[selectedVoiceIndex];
                }
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                window.speechSynthesis.speak(utterance);
            } catch (err) {
                // If anything goes wrong, resolve to continue sequence
                console.warn('TTS chunk error', err);
                resolve();
            }
        });
    }

    // Main sequence runner
    async function executeTTSSequence() {
        const rawText = textInput.value || '';
        const selectedVoiceIndex = (voiceSelect.value === '' || voiceSelect.value === null) ? null : parseInt(voiceSelect.value, 10);

        if (!rawText.trim()) {
            statusDisplay.textContent = 'ERR: BUFFER EMPTY';
            statusDisplay.style.color = '#ef4444';
            statusDisplay.style.fontWeight = '800';
            return;
        }

        // Cancel any ongoing speech and prevent overlap
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        }

        playBtn.disabled = true;
        chunkListDisplay.innerHTML = '';

        const chunks = breakTextIntoChunks(rawText);
        statusDisplay.textContent = `[${chunks.length} CHUNKS] RUNNING...`;
        statusDisplay.style.color = '#10b981';
        statusDisplay.style.fontWeight = '800';

        // populate list
        chunks.forEach((chunk, index) => {
            const li = document.createElement('li');
            li.id = `chunk-item-${index}`;
            li.textContent = `> CHUNK ${index + 1} PENDING`;
            chunkListDisplay.appendChild(li);
        });

        // sequential playback
        for (let i = 0; i < chunks.length; i++) {
            const currentLi = document.getElementById(`chunk-item-${i}`);
            if (currentLi) {
                currentLi.textContent = `> PLAYING CHUNK ${i + 1} / ${chunks.length}`;
                currentLi.style.color = '#ef4444';
                currentLi.style.fontWeight = '800';
                currentLi.style.borderLeft = '3px solid #ef4444';
                currentLi.style.paddingLeft = '8px';
            }

            await processAndPlayChunk(chunks[i], selectedVoiceIndex);

            if (currentLi) {
                currentLi.textContent = `> CHUNK ${i + 1} CLEARED`;
                currentLi.style.color = '#94a3b8';
                currentLi.style.textDecoration = 'line-through';
                currentLi.style.borderLeft = 'none';
                currentLi.style.paddingLeft = '8px';
            }
        }

        statusDisplay.textContent = 'SYSTEM IDLE';
        statusDisplay.style.color = '#94a3b8';
        statusDisplay.style.fontWeight = '700';
        playBtn.disabled = false;
    }

    playBtn.addEventListener('click', executeTTSSequence);
});
</script>
</body>
</html>
